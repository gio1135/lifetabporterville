<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="text-scale" content="scale" />

    <!-- Favicon and PWA Meta Tags -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#150529" media="(prefers-color-scheme: dark)" />

    <!-- iOS / Android home screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LifeTab" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    %sveltekit.head%
  </head>
  <body
    data-sveltekit-preload-data="hover"
    class="bg-dots-pattern min-h-screen text-slate-900 antialiased transition-colors duration-300 dark:text-slate-100"
  >
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
